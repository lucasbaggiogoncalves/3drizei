<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-card); max-width: 700px; }
  .lead { font-size: 18px; line-height: 1.6; color: var(--text-body); margin: 0 0 12px; font-weight: 600; }
  .p { font-size: 15px; line-height: 1.7; color: var(--text-muted); margin: 0; max-width: 60ch; }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-subtle); margin-top: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
</style></head>
<body>
  <p class="lead">Cada peça nasce de uma história sua.</p>
  <p class="p">Você nos conta a ideia — um nome, uma data, um detalhe que importa — e a gente modela, imprime e acaba à mão. É decoração e presente com significado, pensado para durar na estante e na lembrança.</p>
  <div class="note">Nunito Sans · 600 / 400 · 15–18px · line-height 1.6–1.7</div>
</body></html>
