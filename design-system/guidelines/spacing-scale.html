<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing scale" subtitle="4px base unit — terracotta bars show each step" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px 28px; background: var(--surface-card); }
  .r { display: flex; align-items: center; gap: 14px; margin-bottom: 7px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 92px; flex: none; }
  .bar { height: 14px; background: var(--terracotta-400); border-radius: 3px; }
</style></head>
<body>
  <div class="r"><span class="tok">space-2 · 8</span><div class="bar" style="width:8px"></div></div>
  <div class="r"><span class="tok">space-4 · 16</span><div class="bar" style="width:16px"></div></div>
  <div class="r"><span class="tok">space-6 · 24</span><div class="bar" style="width:24px"></div></div>
  <div class="r"><span class="tok">space-8 · 32</span><div class="bar" style="width:32px"></div></div>
  <div class="r"><span class="tok">space-12 · 48</span><div class="bar" style="width:48px"></div></div>
  <div class="r"><span class="tok">space-16 · 64</span><div class="bar" style="width:64px"></div></div>
  <div class="r"><span class="tok">space-24 · 96</span><div class="bar" style="width:96px"></div></div>
</body></html>
