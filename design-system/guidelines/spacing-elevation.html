<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation" subtitle="Warm brown-tinted shadows, never blue-grey" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 30px 28px; background: var(--clay-50); display: flex; gap: 28px; align-items: center; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 100px; height: 70px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; }
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lbl">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lbl">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lbl">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="lbl">xl</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-brand)"></div><div class="lbl">brand</div></div>
</body></html>
