<!-- @dsCard group="Colors" viewport="700x230" name="Brand anchors" subtitle="The four colors sampled from the badge" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .sw { border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 96px; }
  .meta { padding: 10px 12px; background: var(--surface-card); }
  .name { font-family: var(--font-display); font-weight: 600; font-size: 14px; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--brand-terracotta)"></div><div class="meta"><div class="name">Terracotta</div><div class="hex">#C2440F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-copper)"></div><div class="meta"><div class="name">Copper</div><div class="hex">#94411F</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--brand-ink)"></div><div class="meta"><div class="name">Ink</div><div class="hex">#1B1714</div></div></div>
    <div class="sw" style="border:1px solid var(--border-subtle)"><div class="chip" style="background:var(--brand-cream)"></div><div class="meta"><div class="name">Cream</div><div class="hex">#F3E6DB</div></div></div>
  </div>
</body></html>
