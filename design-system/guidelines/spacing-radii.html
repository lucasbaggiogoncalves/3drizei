<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radii" subtitle="Generous, soft — like a filleted 3D print" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 84px; height: 84px; background: var(--terracotta-100); border: 2px solid var(--terracotta-400); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 8px; }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lbl">sm · 8</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lbl">md · 12</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lbl">lg · 18</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lbl">xl · 24</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lbl">2xl · 32</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-pill)"></div><div class="lbl">pill</div></div>
</body></html>
