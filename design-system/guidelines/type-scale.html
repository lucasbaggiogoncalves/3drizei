<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>

  .r:last-child { border: 0; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); width: 64px; flex: none; }

</style></head>
<body>
  <div class="r"><span class="tok">6xl 72</span><span class="spec" style="font-size:46px">Afeto</span></div>

  <div class="r"><span class="tok">3xl 35</span><span class="spec" style="font-size:32px">Presentes com história</span></div>
  <div class="r"><span class="tok">2xl 28</span><span class="spec" style="font-size:26px">Decoração personalizada</span></div>
  <div class="r"><span class="tok">xl 22</span><span class="spec" style="font-size:22px;font-weight:500">Feito à mão, peça a peça</span></div>
  <div class="r"><span class="tok">base 16</span><span class="spec" style="font-size:16px;font-weight:400;font-family:var(--font-body)">Texto de corpo em Nunito Sans</span></div>
