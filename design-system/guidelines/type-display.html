<!-- @dsCard group="Type" viewport="700x250" name="Display — Fredoka" subtitle="Headlines & the brand voice. Rounded, friendly, warm" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 26px 28px; background: var(--surface-card); }
  .d1 { font-family: var(--font-display); font-weight: 600; font-size: 52px; line-height: 1.05; letter-spacing: -0.02em; color: var(--text-strong); margin: 0; }
  .d2 { font-family: var(--font-display); font-weight: 500; font-size: 30px; color: var(--text-strong); margin: 14px 0 0; }
  .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 16px; text-transform: uppercase; letter-spacing: 0.08em; }
  .accent { color: var(--terracotta-500); }
</style></head>
<body>
  <h1 class="d1">Feito com <span class="accent">afeto</span>, impresso em 3D</h1>
  <p class="d2">Presentes que guardam memória</p>
  <div class="note">Fredoka · 600 / 500 · tracking −0.02em</div>
</body></html>
