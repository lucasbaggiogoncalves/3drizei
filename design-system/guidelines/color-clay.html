<!-- @dsCard group="Colors" viewport="700x160" name="Clay neutrals" subtitle="Warm greys from cream to charcoal ink" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--surface-card); }
  .scale { display: grid; grid-template-columns: repeat(11, 1fr); border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); border: 1px solid var(--border-subtle); }
  .step { height: 72px; }
  .lbl { margin-top: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: grid; grid-template-columns: repeat(11, 1fr); text-align: center; }
</style></head>
<body>
  <div class="scale">
    <div class="step" style="background:var(--clay-50)"></div>
    <div class="step" style="background:var(--clay-100)"></div>
    <div class="step" style="background:var(--clay-200)"></div>
    <div class="step" style="background:var(--clay-300)"></div>
    <div class="step" style="background:var(--clay-400)"></div>
    <div class="step" style="background:var(--clay-500)"></div>
    <div class="step" style="background:var(--clay-600)"></div>
    <div class="step" style="background:var(--clay-700)"></div>
    <div class="step" style="background:var(--clay-800)"></div>
    <div class="step" style="background:var(--clay-900)"></div>
    <div class="step" style="background:var(--clay-950)"></div>
  </div>
  <div class="lbl"><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span></div>
</body></html>
