<!-- @dsCard group="Components" viewport="700x560" name="Core — Buttons, Badges, Tags, Avatar" subtitle="Action & identity primitives" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style>
  body { margin: 0; padding: 24px 26px; background: var(--surface-card); }
  .group { margin-bottom: 22px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 10px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, IconButton, Badge, Tag, Avatar } = window.Ds3drizeiDesignSystem_046328;
const Ic = ({n}) => <i data-lucide={n}></i>;

function Demo() {
  const [sel, setSel] = React.useState('Presentes');
  return (
    <div>
      <div className="group">
        <div className="lbl">Buttons</div>
        <div className="row">
          <Button variant="primary" iconLeft={<Ic n="gift"/>}>Encomendar</Button>
          <Button variant="secondary">Secundário</Button>
          <Button variant="outline">Contorno</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="inverse">Ink</Button>
          <Button variant="primary" disabled>Indisponível</Button>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Sizes</div>
        <div className="row">
          <Button size="sm">Pequeno</Button>
          <Button size="md">Médio</Button>
          <Button size="lg" iconRight={<Ic n="arrow-right"/>}>Grande</Button>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Icon buttons</div>
        <div className="row">
          <IconButton label="Favoritar" variant="soft"><Ic n="heart"/></IconButton>
          <IconButton label="Carrinho" variant="solid"><Ic n="shopping-bag"/></IconButton>
          <IconButton label="Compartilhar" variant="outline"><Ic n="share-2"/></IconButton>
          <IconButton label="Mais" variant="ghost"><Ic n="more-horizontal"/></IconButton>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Badges</div>
        <div className="row">
          <Badge tone="brand">Personalizável</Badge>
          <Badge tone="copper">Edição especial</Badge>
          <Badge tone="success" variant="solid">Pronto</Badge>
          <Badge tone="warning">Sob encomenda</Badge>
          <Badge tone="danger">Esgotado</Badge>
          <Badge tone="neutral">PLA</Badge>
        </div>
      </div>
      <div className="group">
        <div className="lbl">Tags &amp; avatars</div>
        <div className="row">
          {['Presentes','Decoração','Aniversário'].map(t => (
            <Tag key={t} selected={sel===t} onClick={()=>setSel(t)}>{t}</Tag>
          ))}
          <Tag removable onRemove={()=>{}}>Filtro</Tag>
          <span style={{width:12}}></span>
          <Avatar name="Marina Reis" size="md"/>
          <Avatar name="Davi Lima" size="md"/>
          <Avatar name="3 D" size="md" style={{background:'var(--terracotta-100)',color:'var(--terracotta-700)'}}/>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
setTimeout(() => window.lucide && window.lucide.createIcons(), 80);
</script>
</body>
</html>
